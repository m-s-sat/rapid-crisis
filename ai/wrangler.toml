name = "sentinel-ai-worker"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
GEMINI_MODEL = "gemini-2.5-flash-lite"

[[services]]
binding = "PRIMARY_API"
service = "sentinel-primary-api"

[observability]
enabled = true
